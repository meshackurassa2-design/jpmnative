name: Build Unsigned iOS IPA

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild -p ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build Unsigned App
        run: |
          xcodebuild build -workspace ios/JPM.xcworkspace \
            -scheme JPM \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY="" \
            CONFIGURATION_BUILD_DIR=$(pwd)/build/Release-iphoneos

      - name: Package into IPA
        run: |
          mkdir -p build/Payload
          cp -R build/Release-iphoneos/JPM.app build/Payload
          cd build
          zip -r jpm-unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jpm-unsigned-ipa
          path: build/jpm-unsigned.ipa
