name: Build Android APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install

      - name: Build Android APK with EAS Local
        run: |
          export EXPO_TOKEN=$(echo "MGZLVWNNZ2UtbWdZRHRDcTVIS1pUMzNPRU5ObWo3azA0MFZLcEdrMg==" | base64 -d)
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g"
          eas build -p android --profile preview --local --non-interactive

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jpm-android-apk
          path: "**/*.apk"
